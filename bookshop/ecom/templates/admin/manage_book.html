{% extends "admin/admin_base.html" %}

{% block content %}
    <div class="flex flex-1">
        <div class="flex w-full flex-col">
           <div class="flex flex-1 justify-between">
             <h2 class="space-y-3 font-semibold text-2xl ">Manage Books ({{books|length}})</h2>
             <a href="{% url 'admin_insert_book' %}" class="bg-teal-600 text-white px-3 py-2 rounded">Add Book</a>
           </div>
            <table class="w-full border mt-5">
                <thead>
                    <tr>
                        <th class="border">Id</th>
                        <th class="border">title</th>
                        <th class="border">NOP</th>
                        <th class="border">Price</th>
                        <th class="border">Image</th>
                        <th class="border">ISBN</th>
                        <th class="border">Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for book in books %}
                        <tr>
                            <td class="border p-3">{{book.id}}</td>
                            <td class="border p-3">{{book.title}}</td>
                            <td class="border p-3">{{book.no_of_pages}}</td>
                            <td class="border p-3">{{book.price}}</td>
                            <td class="border p-3"><img src="{{book.cover_image.url}}" alt="" class="w-20"></td>
                            <td class="border p-3">{{book.isbn}}</td>
                            <td class="border p-3">
                                <a href="" class="px-2 py-1 bg-blue-600 text-white rounded">Edit</a>
                                <a href="" class="px-2 py-1 bg-red-600 text-white rounded">Delete</a>
                            </td>
                        </tr>
                    {% endfor %}
            </table>
        </div>
    </div>

{% endblock content %}
