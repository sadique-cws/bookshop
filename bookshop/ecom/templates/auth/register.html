{% extends "auth/authbase.html" %}

{% load crispy_forms_tags %}

{% block content %}

    <div class="flex flex-1 items-center justify-center h-[90vh]">
        <div class="w-full md:w-1/2 lg:w-1/3">
            <h2 class="text-2xl font-semibold mb-6">Create an Account</h2>
            <form action="" method="post">
                {% csrf_token %}
                {{form|crispy}}

                <button type="submit" class="bg-purple-700 text-white px-3 py-2 rounded mt-5 w-full">Login</button>
            </form>
        </div>
     </div>

{% endblock %}
