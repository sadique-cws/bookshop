{% extends "base.html" %}


{% block content %}

    {#  banner  #}

    {#   products #}

    <div class="w-full">
        <div class="border-b border-slate-200 px-5 py-2">
            <h2 class="text-xl font-normal text-slate-700">Recently Added</h2>
        </div>

        <div class="grid grid-cols-6">
            <!-- product card -->
            {% for book in books %}

                <div class="bg-slate-50 border-l border-slate-200">
                    <img src="{{book.cover_image.url}}" class="w-full" alt="">
                    <div class="p-3">
                        <h2 class="capitalize">{{book.title}}</h2>
                        <p class="text-sm text-slate-500">{{book.author}}</p>
                        <p class="text-lg font-semibold text-purple-700 mt-2">₹{{book.price}}</p>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>

{% endblock  %}
